<app-navbar></app-navbar>

<div class="max-w-xl mx-auto mt-10 bg-white shadow-lg rounded-2xl p-6">
  <h1 class="text-2xl font-bold mb-2">Air Quality Index (AQI) Predictor</h1>
  <p class="text-gray-600 mb-6">
    Predict AQI for Colombo, Kandy, and Galle using pollutant values.
  </p>

  <div class="space-y-4">
    <div>
      <label class="block mb-1 font-medium">Select City</label>
      <select [(ngModel)]="city" class="w-full border rounded-lg p-2">
        <option *ngFor="let c of cities" [value]="c">{{ c }}</option>
      </select>
    </div>

    <div>
      <label class="block mb-1 font-medium">PM2.5 (µg/m³)</label>
      <input [(ngModel)]="pm25" type="number" class="w-full border rounded-lg p-2" />
    </div>

    <div>
      <label class="block mb-1 font-medium">CO (mg/m³)</label>
      <input [(ngModel)]="co" type="number" class="w-full border rounded-lg p-2" />
    </div>

    <div>
      <label class="block mb-1 font-medium">NO₂ (ppb)</label>
      <input [(ngModel)]="no2" type="number" class="w-full border rounded-lg p-2" />
    </div>

    <button
      (click)="predictAQI()"
      class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700"
    >
      {{ loading ? 'Predicting...' : 'Predict AQI' }}
    </button>

    <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded-lg">
      {{ error }}
    </div>

    <div *ngIf="aqi !== null" class="bg-blue-50 p-4 rounded-xl mt-4">
      <h2 class="text-xl font-bold">AQI: {{ aqi }}</h2>
      <p class="mt-2"><strong>Status:</strong> {{ label }}</p>
      <p class="mt-2"><strong>Advice:</strong> {{ advice }}</p>
    </div>
  </div>
</div>
