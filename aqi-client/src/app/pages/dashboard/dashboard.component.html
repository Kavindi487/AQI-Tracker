<app-navbar></app-navbar>

<section class="min-h-screen bg-[#f7f8f6] px-6 py-10 md:px-16">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-3 text-5xl font-extrabold text-slate-900">
      Air Quality Index (AQI) Predictor
    </h1>
    <p class="mb-10 text-lg text-slate-600">
      Using machine learning to forecast air quality across Sri Lanka’s major cities based on pollutant metrics.
    </p>

    <div class="grid gap-8 lg:grid-cols-2">
      <!-- Input Card -->
      <div class="rounded-[30px] border border-slate-700 bg-white p-7 shadow-sm">
        <h2 class="mb-8 text-2xl font-extrabold text-slate-900">Input Parameters</h2>

        <div class="space-y-6">
          <div>
            <label class="mb-2 block text-lg font-medium text-slate-700">Select City</label>
            <select
              [(ngModel)]="city"
              name="city"
              class="w-full rounded-2xl border border-slate-500 px-5 py-4 text-lg outline-none"
            >
              <option value="Colombo">Colombo</option>
              <option value="Kandy">Kandy</option>
              <option value="Galle">Galle</option>
            </select>
          </div>

          <div>
            <label class="mb-2 block text-lg font-medium text-slate-700">PM2.5 (µg/m³)</label>
            <input
              type="number"
              [(ngModel)]="pm25"
              name="pm25"
              placeholder="e.g. 12.5"
              class="w-full rounded-2xl border border-slate-500 px-5 py-4 text-lg outline-none"
            />
          </div>

          <div>
            <label class="mb-2 block text-lg font-medium text-slate-700">CO (ppm)</label>
            <input
              type="number"
              [(ngModel)]="co"
              name="co"
              placeholder="e.g. 0.8"
              class="w-full rounded-2xl border border-slate-500 px-5 py-4 text-lg outline-none"
            />
          </div>

          <div>
            <label class="mb-2 block text-lg font-medium text-slate-700">NO₂ (ppb)</label>
            <input
              type="number"
              [(ngModel)]="no2"
              name="no2"
              placeholder="e.g. 24.0"
              class="w-full rounded-2xl border border-slate-500 px-5 py-4 text-lg outline-none"
            />
          </div>

          <button
            (click)="predictAQI()"
            [disabled]="loading"
            class="w-full rounded-2xl bg-green-500 px-5 py-4 text-lg font-bold text-white transition hover:bg-green-600 disabled:cursor-not-allowed disabled:opacity-70"
          >
            {{ loading ? 'Predicting...' : 'Predict AQI' }}
          </button>

          <p *ngIf="error" class="text-sm font-medium text-red-500">
            {{ error }}
          </p>
        </div>
      </div>

      <!-- Result Card -->
      <div class="rounded-[30px] border border-slate-700 bg-white p-7 shadow-sm">
        <div class="mb-8 flex items-center justify-between">
          <h2 class="text-2xl font-extrabold text-slate-900">Prediction Result</h2>
          <span class="rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-500">
            UPDATED LIVE
          </span>
        </div>

        <div class="flex flex-col items-center">
          <div
            class="mb-6 flex h-64 w-64 items-center justify-center rounded-full border-[14px]"
            [ngClass]="{
              'border-green-500': getRingClass() === 'low',
              'border-yellow-400': getRingClass() === 'medium',
              'border-red-500': getRingClass() === 'high'
            }"
          >
            <div class="text-center">
              <h3 class="text-7xl font-extrabold text-slate-900">{{ aqi }}</h3>
              <p class="mt-1 text-sm font-semibold tracking-wide text-slate-500">AQI VALUE</p>
            </div>
          </div>

          <span
            class="mb-5 rounded-full px-5 py-2 text-sm font-bold"
            [ngClass]="{
              'bg-green-100 text-green-700': getRingClass() === 'low',
              'bg-yellow-100 text-yellow-700': getRingClass() === 'medium',
              'bg-red-100 text-red-700': getRingClass() === 'high'
            }"
          >
            {{ label }}
          </span>

          <p class="max-w-md text-center text-lg leading-8 text-slate-600">
            {{ advice }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
