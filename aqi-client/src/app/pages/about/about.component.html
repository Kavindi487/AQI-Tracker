<app-navbar></app-navbar>

<section class="about-page">
  <div class="hero-card">
    <div class="hero-text">
      <p class="eyebrow">About AQI Predictor</p>
      <h1>Smarter air quality awareness for Sri Lanka</h1>
      <p class="lead">
        AQI Predictor is a machine-learning-powered web application designed to estimate
        air quality levels across Sri Lankan cities using pollutant data.
      </p>
    </div>
  </div>

  <div class="feature-grid">
    <div class="feature-card" *ngFor="let feature of features">
      <h3>{{ feature.title }}</h3>
      <p>{{ feature.description }}</p>
    </div>
  </div>

  <div class="tech-card">
    <h2>Technology Stack</h2>
    <div class="tech-list">
      <span *ngFor="let item of stack">{{ item }}</span>
    </div>
  </div>
</section>
